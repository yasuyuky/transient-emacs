name: release

on:
  push:
    tags:
      - v*
  schedule:
    # GitHub cron cannot express "every 4 weeks", so run weekly and gate below.
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      force:
        description: Release even when the latest release is newer than 4 weeks
        required: false
        default: false
        type: boolean
      publish_only:
        description: Publish an existing release without creating a new tag or GitHub release
        required: false
        default: false
        type: boolean
      tag:
        description: Existing release tag for publish_only; defaults to the latest v* tag
        required: false
        default: ''
        type: string
      publish_target:
        description: Marketplace to publish in publish_only mode
        required: false
        default: all
        type: choice
        options:
          - all
          - vsce
          - ovsx

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'push' && github.ref || github.event.repository.default_branch }}

      - name: Check release window
        id: release_window
        shell: bash
        env:
          FORCE_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.force }}
          PUBLISH_ONLY: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_only }}
          PUBLISH_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || '' }}
          PUBLISH_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_only && inputs.publish_target || 'all' }}
          RELEASE_INTERVAL_SECONDS: 2419200
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "publish_target=${PUBLISH_TARGET}" >>"$GITHUB_OUTPUT"

          if [[ "$GITHUB_EVENT_NAME" = "workflow_dispatch" && "$PUBLISH_ONLY" = "true" ]]; then
            tag="${PUBLISH_TAG#refs/tags/}"
            if [[ -z "$tag" ]]; then
              tag=$(git describe --tags --match 'v[0-9]*' --abbrev=0 2>/dev/null || true)
            fi

            if [[ -z "$tag" ]]; then
              echo "::error::No v* tag found for publish_only"
              exit 1
            fi

            if [[ "$tag" != v* ]]; then
              echo "::error::publish_only tag must start with v"
              exit 1
            fi

            if ! git rev-parse --verify --quiet "refs/tags/${tag}" >/dev/null; then
              echo "::error::${tag} does not exist"
              exit 1
            fi

            if ! gh release view "$tag" >/dev/null; then
              echo "::error::GitHub release ${tag} does not exist"
              exit 1
            fi

            echo "mode=publish" >>"$GITHUB_OUTPUT"
            echo "should_release=true" >>"$GITHUB_OUTPUT"
            echo "v=${tag}" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$GITHUB_EVENT_NAME" = "push" ]]; then
            echo "mode=tag" >>"$GITHUB_OUTPUT"
            echo "should_release=true" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          latest_tag=$(git describe --tags --match 'v[0-9]*' --abbrev=0 2>/dev/null || true)
          if [[ -z "$latest_tag" ]]; then
            echo "mode=scheduled" >>"$GITHUB_OUTPUT"
            echo "should_release=true" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          commits=$(git rev-list "${latest_tag}..HEAD" --count)
          if [[ "$commits" -eq 0 ]]; then
            echo "No changes since ${latest_tag}."
            echo "should_release=false" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          last_release=$(git log -1 --format=%ct "$latest_tag")
          now=$(date +%s)
          age=$((now - last_release))
          if [[ "$FORCE_RELEASE" != "true" && "$age" -lt "$RELEASE_INTERVAL_SECONDS" ]]; then
            echo "${latest_tag} is newer than 4 weeks."
            echo "should_release=false" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          echo "mode=scheduled" >>"$GITHUB_OUTPUT"
          echo "should_release=true" >>"$GITHUB_OUTPUT"

      - name: Checkout publish tag
        if: steps.release_window.outputs.mode == 'publish'
        env:
          TAG: ${{ steps.release_window.outputs.v }}
        run: git checkout --detach "$TAG"

      - name: Get publish version
        id: publish_ver
        if: steps.release_window.outputs.mode == 'publish'
        env:
          TAG: ${{ steps.release_window.outputs.v }}
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo ${VERSION}
          echo version=${VERSION} >>$GITHUB_OUTPUT
          test "$TAG" = "v${VERSION}"

      - name: Get date
        id: get_date
        if: steps.release_window.outputs.should_release == 'true' && steps.release_window.outputs.mode != 'publish'
        run: |
          date +'%Y.%m.%d'
          echo date=$(date +'%Y.%m.%d') >>$GITHUB_OUTPUT

      - uses: actions/setup-node@v6
        if: steps.release_window.outputs.should_release == 'true'
        with:
          node-version: '20.x'

      - name: Get tag version
        id: ver
        if: steps.release_window.outputs.mode == 'tag'
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo ${VERSION}
          echo version=${VERSION} >>$GITHUB_OUTPUT
          echo v=v${VERSION} >>$GITHUB_OUTPUT
          test "${GITHUB_REF#refs/tags/}" = "v${VERSION}"

      - name: Bump patch version
        id: bump
        if: steps.release_window.outputs.mode == 'scheduled'
        run: |
          npm version patch --no-git-tag-version
          VERSION=$(jq -r '.version' package.json)
          TAG=v${VERSION}

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::${TAG} already exists"
            exit 1
          fi

          echo version=${VERSION} >>$GITHUB_OUTPUT
          echo v=${TAG} >>$GITHUB_OUTPUT

      - name: Sync VS Code engine
        if: steps.release_window.outputs.should_release == 'true' && steps.release_window.outputs.mode != 'publish'
        run: |
          node <<'NODE'
          const fs = require('fs');

          const readJson = (file) => JSON.parse(fs.readFileSync(file, 'utf8'));
          const writeJson = (file, data) => {
            fs.writeFileSync(file, `${JSON.stringify(data, null, 2)}\n`);
          };

          const manifest = readJson('package.json');
          const vscode = manifest.devDependencies?.['@types/vscode'];

          if (!vscode) {
            throw new Error('@types/vscode is missing from devDependencies');
          }

          manifest.engines ??= {};
          manifest.engines.vscode = vscode;
          writeJson('package.json', manifest);

          const lock = readJson('package-lock.json');
          lock.packages ??= {};
          lock.packages[''] ??= {};
          lock.packages[''].engines ??= {};
          lock.packages[''].engines.vscode = vscode;
          writeJson('package-lock.json', lock);
          NODE

      - name: Start xvfb
        if: steps.release_window.outputs.mode == 'scheduled'
        run: |
          /usr/bin/Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          echo ">>> Started xvfb"

      - name: Test scheduled release
        if: steps.release_window.outputs.mode == 'scheduled'
        run: |
          npm ci
          npm test
        env:
          DISPLAY: ':99.0'

      - name: Push scheduled release tag
        if: steps.release_window.outputs.mode == 'scheduled'
        env:
          TAG: ${{ steps.bump.outputs.v }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "Release ${TAG}"
          git tag "$TAG"
          git push --atomic origin "HEAD:${{ github.event.repository.default_branch }}" "$TAG"

      - name: Create Release
        if: steps.release_window.outputs.should_release == 'true' && steps.release_window.outputs.mode != 'publish'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.v || steps.bump.outputs.v }}
          DATE: ${{ steps.get_date.outputs.date }}
        run: |
          gh release create "$TAG" \
            --title "Release ${TAG} (${DATE})" \
            --generate-notes

      - name: Publish
        if: steps.release_window.outputs.should_release == 'true'
        run: |
          npx vsce package
          if [[ "$PUBLISH_TARGET" = "all" || "$PUBLISH_TARGET" = "vsce" ]]; then
            npx vsce publish
          fi
          if [[ "$PUBLISH_TARGET" = "all" || "$PUBLISH_TARGET" = "ovsx" ]]; then
            npx ovsx publish transient-emacs-${VERSION}.vsix -p $OVSX_TOKEN
          fi
        env:
          VERSION: ${{ steps.ver.outputs.version || steps.bump.outputs.version || steps.publish_ver.outputs.version }}
          PUBLISH_TARGET: ${{ steps.release_window.outputs.publish_target || 'all' }}
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
